<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}DMmeLord{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  {% block head %}{% endblock %}
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-left">
    <span class="logo">⚔ DMmeLord</span>
  </div>
  <nav class="topbar-nav">
    <a href="{{ url_for('main.dashboard') }}" class="nav-link {% if request.endpoint == 'main.dashboard' %}active{% endif %}">Dashboard</a>
    <a href="{{ url_for('npcs.index') }}" class="nav-link {% if request.endpoint and request.endpoint.startswith('npcs.') %}active{% endif %}">NPCs</a>
    <a href="{{ url_for('locations.index') }}" class="nav-link {% if request.endpoint and request.endpoint.startswith('locations.') %}active{% endif %}">Locations</a>
    <a href="{{ url_for('sessions.index') }}" class="nav-link {% if request.endpoint and request.endpoint.startswith('sessions.') %}active{% endif %}">Sessions</a>
    <a href="{{ url_for('calendar.index') }}" class="nav-link {% if request.endpoint and request.endpoint.startswith('calendar.') %}active{% endif %}">Calendar</a>
    <a href="{{ url_for('economy.index') }}" class="nav-link {% if request.endpoint and request.endpoint.startswith('economy.') %}active{% endif %}">Economy</a>
    <a href="{{ url_for('map.index') }}" class="nav-link {% if request.endpoint and request.endpoint.startswith('map.') %}active{% endif %}">Map</a>
  </nav>
  <div class="topbar-right">
    <!-- Search -->
    <form method="GET" action="{{ url_for('main.search') }}" class="topbar-search">
      <input type="text" name="q" placeholder="Search…" class="topbar-search-input"
             {% if request.endpoint == 'main.search' %}value="{{ request.args.get('q', '') }}"{% endif %}>
    </form>
    <!-- Campaign switcher -->
    <div class="campaign-switcher">
      <button class="switcher-btn" id="switcherToggle">
        {{ campaign }} <span class="caret">▾</span>
      </button>
      <div class="switcher-dropdown" id="switcherDropdown">
        {% for c in campaigns %}
          <a href="{{ url_for('main.switch_campaign', name=c) }}"
             class="switcher-option {% if c == campaign %}current{% endif %}">
            {{ c }}
          </a>
        {% endfor %}
      </div>
    </div>
    <!-- Initiative tracker toggle -->
    <button class="icon-btn" id="initiativeToggle" title="Initiative tracker">⚡</button>
  </div>
</header>

<!-- MAIN CONTENT -->
<main class="main-content">
  {% block content %}{% endblock %}
</main>

<!-- INITIATIVE PANEL (slide-over) -->
<div class="initiative-panel" id="initiativePanel">
  <div class="initiative-header">
    <span>Initiative</span>
    <button class="icon-btn" id="initiativeClose">✕</button>
  </div>
  <div class="initiative-list" id="initiativeList"></div>
  <div class="initiative-add">
    <input type="text" id="initName" placeholder="Name" class="init-input">
    <input type="number" id="initNumber" placeholder="Init" class="init-input init-num">
    <button class="btn-primary" onclick="addInitiative()">+</button>
  </div>
  <div class="initiative-actions">
    <button class="btn-ghost" onclick="sortInitiative()">Sort ↓</button>
    <button class="btn-ghost" onclick="clearInitiative()">Clear</button>
  </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
